name: notify

on:
  pull_request:
    types: [opened, closed]
    branches:
      - master
      - staging
  push:
    branches:
      - master
      - staging

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Send message for push
        if: github.event_name == 'push'
        uses: appleboy/discord-action@master
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          color: "#48f442"
          username: "The Bot"
          message: |
            🚀 Novo push na branch **${{ github.ref }}**

            [Repositório](${{
              github.event.repository.html_url
            }})

            [Commit](${{
              github.event.head_commit.url
            }})

      - name: Send message for pull request opened
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: appleboy/discord-action@master
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          color: "#48f442"
          username: "The Bot"
          message: |
            🎉 Novo Pull request aberto!

            **${{ github.event.pull_request.title }}**

            ${{ github.event.pull_request.body }}

            [Repositório](${{
              github.event.repository.html_url
            }})
              
            [Pull Request](${{
              github.event.pull_request.html_url
            }})

      - name: Send message for merge
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        uses: appleboy/discord-action@master
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          color: "#48f442"
          username: "The Bot"
          message: |
            🚀 Pull request mesclado na master!

            **${{ github.event.pull_request.title }}**

            Autor: ${{ github.event.pull_request.user.login }}

            [Repositório](${{
              github.event.repository.html_url
            }})

            [Pull Request](${{
              github.event.pull_request.html_url
            }})